# Labeler configuration for automatic PR labeling

# Documentation
documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - 'README.md'
          - '*.md'

# Docker
docker:
  - changed-files:
      - any-glob-to-any-file:
          - 'Dockerfile'
          - 'docker-compose.yml'
          - '.dockerignore'

# GitHub Actions
github-actions:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/actions/**'

# Angular Components
angular:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/app/components/**'
          - 'src/app/pages/**'

# Styles
styles:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/styles.scss'
          - 'tailwind.config.js'
          - 'postcss.config.js'

# Configuration
config:
  - changed-files:
      - any-glob-to-any-file:
          - 'angular.json'
          - 'tsconfig*.json'
          - 'package.json'
          - 'pnpm-lock.yaml'
          - 'vercel.json'

# Bug
bug:
  - head-branch: ['bug', 'fix']

# Feature
feature:
  - head-branch: ['feature', 'feat']

# Enhancement
enhancement:
  - head-branch: ['enhance', 'improvement']
