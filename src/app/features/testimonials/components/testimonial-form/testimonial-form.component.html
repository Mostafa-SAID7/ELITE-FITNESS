<div class="bg-white/5 border border-white/10 rounded-lg p-8">
  <h3 class="text-2xl font-semibold text-white mb-6">Share Your Story</h3>
  
  <!-- Success Message -->
  <div *ngIf="formSubmitted()" class="mb-6 p-4 bg-green-600/20 border border-green-600/50 rounded-lg">
    <p class="text-green-400 font-semibold">✓ Thank you for your submission! We'll review it shortly.</p>
  </div>

  <form (ngSubmit)="onSubmit()" class="space-y-4">
    <!-- Name -->
    <div>
      <label class="block text-sm font-semibold text-white mb-2">Full Name *</label>
      <input type="text" [(ngModel)]="formData.name" name="name" placeholder="Your full name" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:border-primary-600">
    </div>

    <!-- Email -->
    <div>
      <label class="block text-sm font-semibold text-white mb-2">Email Address *</label>
      <input type="email" [(ngModel)]="formData.email" name="email" placeholder="your@email.com" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:border-primary-600">
    </div>

    <!-- Phone -->
    <div>
      <label class="block text-sm font-semibold text-white mb-2">Phone Number</label>
      <input type="tel" [(ngModel)]="formData.phone" name="phone" placeholder="+20 1XX XXX XXXX" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:border-primary-600">
    </div>

    <!-- Location -->
    <div>
      <label class="block text-sm font-semibold text-white mb-2">Location</label>
      <select [(ngModel)]="formData.location" name="location" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white focus:outline-none focus:border-primary-600">
        <option value="">Select location...</option>
        <option *ngFor="let loc of locations" [value]="loc">{{ loc }}</option>
      </select>
    </div>

    <!-- Program -->
    <div>
      <label class="block text-sm font-semibold text-white mb-2">Program</label>
      <select [(ngModel)]="formData.program" name="program" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white focus:outline-none focus:border-primary-600">
        <option value="">Select program...</option>
        <option *ngFor="let prog of programs" [value]="prog">{{ prog }}</option>
      </select>
    </div>

    <!-- Rating -->
    <div>
      <label class="block text-sm font-semibold text-white mb-2">Rating</label>
      <div class="flex gap-2">
        <button type="button" *ngFor="let i of [1,2,3,4,5]" (click)="formData.rating = i" class="transition-all" [ngClass]="{'text-yellow-400': formData.rating >= i, 'text-white/30': formData.rating < i}">
          ★
        </button>
      </div>
    </div>

    <!-- Quote (Testimonial Text) -->
    <div>
      <label class="block text-sm font-semibold text-white mb-2">Your Testimonial *</label>
      <textarea [(ngModel)]="formData.quote" name="quote" placeholder="Tell us your story..." rows="4" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:border-primary-600"></textarea>
    </div>

    <!-- Results Achieved -->
    <div>
      <label class="block text-sm font-semibold text-white mb-2">Results Achieved *</label>
      <input type="text" [(ngModel)]="formData.result" name="result" placeholder="e.g., 15kg weight loss, improved strength" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:border-primary-600">
    </div>

    <!-- Image URL -->
    <div>
      <label class="block text-sm font-semibold text-white mb-2">Image URL</label>
      <input type="url" [(ngModel)]="formData.imageUrl" name="imageUrl" placeholder="https://example.com/image.jpg" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:border-primary-600">
    </div>

    <!-- Consent -->
    <div class="flex items-start gap-3">
      <input type="checkbox" [(ngModel)]="formData.consent" name="consent" id="consent" class="mt-1 w-4 h-4">
      <label for="consent" class="text-sm text-white/80">
        I agree to have my testimonial published on HIT Egypt's website and social media. I understand my name and photo may be displayed publicly. *
      </label>
    </div>

    <!-- Submit Button -->
    <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-semibold py-3 rounded-lg transition-colors">
      Submit Testimonial
    </button>
  </form>

  <p class="text-white/60 text-sm mt-4">* Required fields. We review all submissions before publishing.</p>
</div>
